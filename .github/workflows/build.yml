name: Android CI

on:
  workflow_dispatch:
  pull_request:

jobs:
  verify:
    name: ${{ matrix.job_name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        include:
          - job_name: Lint
            gradle_task: lintDebug
            publish_test_results: false
          - job_name: Unit Tests
            gradle_task: testDebugUnitTest
            publish_test_results: true
          - job_name: Assemble Debug
            gradle_task: assembleDebug
            publish_test_results: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Run ${{ matrix.gradle_task }}
        run: ./gradlew :app:${{ matrix.gradle_task }}

      - name: Upload unit test reports
        if: ${{ matrix.publish_test_results }}
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: |
            app/build/test-results/testDebugUnitTest/**
            app/build/reports/tests/testDebugUnitTest/**
          if-no-files-found: error
