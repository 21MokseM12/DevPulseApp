name: Android CI

on:
  workflow_dispatch:
  pull_request:

jobs:
  verify:
    name: ${{ matrix.gate_name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        include:
          - gate_id: quality
            gate_name: Quality (ktlint + lint)
            gradle_command: :app:qualityCheck
            retry_on_fail: false
            merge_policy: blocking
          - gate_id: unit
            gate_name: Unit Tests
            gradle_command: :app:testDebugUnitTest
            retry_on_fail: true
            merge_policy: blocking
          - gate_id: contract
            gate_name: Contract Check
            gradle_command: :app:testDebugUnitTest --tests "*Contract*" --tests "*MockWebServer*"
            retry_on_fail: true
            merge_policy: blocking
          - gate_id: assemble
            gate_name: Assemble Debug
            gradle_command: :app:assembleDebug
            retry_on_fail: false
            merge_policy: blocking

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Run ${{ matrix.gate_name }} with retry policy
        env:
          GATE_ID: ${{ matrix.gate_id }}
          GATE_NAME: ${{ matrix.gate_name }}
          GRADLE_COMMAND: ${{ matrix.gradle_command }}
          RETRY_ON_FAIL: ${{ matrix.retry_on_fail }}
          MERGE_POLICY: ${{ matrix.merge_policy }}
        run: |
          set -eo pipefail
          mkdir -p ci-metadata

          max_attempts=1
          if [ "$RETRY_ON_FAIL" = "true" ]; then
            max_attempts=2
          fi

          attempt=1
          status="failure"
          start_epoch=$(date +%s)
          while [ $attempt -le $max_attempts ]; do
            echo "Running gate '$GATE_NAME' (attempt $attempt/$max_attempts)"
            if ./gradlew --no-daemon --stacktrace $GRADLE_COMMAND; then
              status="success"
              break
            fi

            if [ $attempt -lt $max_attempts ]; then
              echo "Retrying gate '$GATE_NAME' after failure..."
              sleep 10
            fi
            attempt=$((attempt + 1))
          done
          end_epoch=$(date +%s)
          duration_seconds=$((end_epoch - start_epoch))

          ATTEMPTS_USED="$attempt" \
          MAX_ATTEMPTS="$max_attempts" \
          STATUS="$status" \
          DURATION_SECONDS="$duration_seconds" \
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          gate_metadata = {
              "gate_id": os.environ["GATE_ID"],
              "gate_name": os.environ["GATE_NAME"],
              "gradle_task": os.environ["GRADLE_COMMAND"],
              "merge_policy": os.environ["MERGE_POLICY"],
              "retry_enabled": os.environ["RETRY_ON_FAIL"] == "true",
              "attempts_used": int(os.environ["ATTEMPTS_USED"]),
              "max_attempts": int(os.environ["MAX_ATTEMPTS"]),
              "status": os.environ["STATUS"],
              "duration_seconds": int(os.environ["DURATION_SECONDS"]),
          }
          Path("ci-metadata").mkdir(parents=True, exist_ok=True)
          Path(f"ci-metadata/gate-{gate_metadata['gate_id']}.json").write_text(
              json.dumps(gate_metadata, indent=2),
              encoding="utf-8",
          )
          PY
          if [ "$status" != "success" ]; then
            echo "Gate ${{ matrix.gate_name }} failed."
            exit 1
          fi

      - name: Upload quality artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-${{ matrix.gate_id }}
          path: |
            ci-metadata/gate-${{ matrix.gate_id }}.json
            app/build/reports/ktlint/**
            app/build/reports/lint-results-debug.html
            app/build/reports/lint-results-debug.xml
            app/build/test-results/testDebugUnitTest/**
            app/build/reports/tests/testDebugUnitTest/**
            app/build/reports/jacoco/jacocoTestReport/**
            app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

  instrumented-smoke:
    name: Instrumented Smoke (Compose)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Run instrumented smoke tests with retry
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_7
          disable-animations: true
          emulator-options: -no-snapshot -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          script: |
            set -eo pipefail
            mkdir -p app/build/reports/androidTests app/build/outputs/androidTest-results ci-metadata
            max_attempts=2
            attempt=1
            status="failure"
            start_epoch=$(date +%s)
            while [ $attempt -le $max_attempts ]; do
              echo "Running instrumented smoke (attempt $attempt/$max_attempts)"
              if ./gradlew --no-daemon --stacktrace :app:connectedDebugAndroidTest \
                -Pandroid.testInstrumentationRunnerArguments.class=com.devpulse.app.ui.DevPulseAppTest; then
                status="success"
                break
              fi
              if [ $attempt -lt $max_attempts ]; then
                echo "Retrying smoke suite after failure..."
                sleep 10
              fi
              attempt=$((attempt + 1))
            done
            end_epoch=$(date +%s)
            duration_seconds=$((end_epoch - start_epoch))
            adb logcat -d > app/build/reports/androidTests/logcat-smoke.txt || true
            ATTEMPTS_USED="$attempt" \
            MAX_ATTEMPTS="$max_attempts" \
            STATUS="$status" \
            DURATION_SECONDS="$duration_seconds" \
            python3 - <<'PY'
            import json
            import os
            from pathlib import Path

            gate_metadata = {
                "gate_id": "instrumented-smoke",
                "gate_name": "Instrumented Smoke (Compose)",
                "gradle_task": ":app:connectedDebugAndroidTest -Pandroid.testInstrumentationRunnerArguments.class=com.devpulse.app.ui.DevPulseAppTest",
                "merge_policy": "blocking",
                "retry_enabled": True,
                "attempts_used": int(os.environ["ATTEMPTS_USED"]),
                "max_attempts": int(os.environ["MAX_ATTEMPTS"]),
                "status": os.environ["STATUS"],
                "duration_seconds": int(os.environ["DURATION_SECONDS"]),
            }
            Path("ci-metadata").mkdir(parents=True, exist_ok=True)
            Path("ci-metadata/gate-instrumented-smoke.json").write_text(
                json.dumps(gate_metadata, indent=2),
                encoding="utf-8",
            )
            PY
            adb pull \
              /sdcard/Android/data/com.devpulse.app/files/smoke-screenshots \
              app/build/outputs/androidTest-results/smoke-screenshots || true
            if [ "$status" != "success" ]; then
              exit 1
            fi

      - name: Upload instrumented smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-instrumented-smoke
          path: |
            ci-metadata/gate-instrumented-smoke.json
            app/build/outputs/androidTest-results/**
            app/build/reports/androidTests/**
            app/build/outputs/androidTest-results/smoke-screenshots/**
          if-no-files-found: error

  instrumented-migration:
    name: Instrumented Migration (Room)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Run migration instrumented tests with retry
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_7
          disable-animations: true
          emulator-options: -no-snapshot -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          script: |
            set -eo pipefail
            mkdir -p app/build/reports/androidTests app/build/outputs/androidTest-results ci-metadata
            max_attempts=2
            attempt=1
            status="failure"
            gradle_task=":app:connectedDebugAndroidTest -Pandroid.testInstrumentationRunnerArguments.class=com.devpulse.app.data.local.db.AppDatabaseMigrationTest"
            start_epoch=$(date +%s)
            while [ $attempt -le $max_attempts ]; do
              echo "Running migration instrumented suite (attempt $attempt/$max_attempts)"
              if ./gradlew --no-daemon --stacktrace :app:connectedDebugAndroidTest \
                -Pandroid.testInstrumentationRunnerArguments.class=com.devpulse.app.data.local.db.AppDatabaseMigrationTest; then
                status="success"
                break
              fi
              if [ $attempt -lt $max_attempts ]; then
                echo "Retrying migration suite after failure..."
                sleep 10
              fi
              attempt=$((attempt + 1))
            done
            end_epoch=$(date +%s)
            duration_seconds=$((end_epoch - start_epoch))
            adb logcat -d > app/build/reports/androidTests/logcat-migration.txt || true
            cat <<EOF > app/build/reports/androidTests/migration-diagnostics.md
            # Migration diagnostics

            - Gate: Instrumented Migration (Room)
            - Gradle task: \`$gradle_task\`
            - Attempts: $attempt/$max_attempts
            - Status: $status
            - Duration seconds: $duration_seconds

            ## Artifacts

            - \`app/build/reports/androidTests/logcat-migration.txt\`
            - \`app/build/outputs/androidTest-results/\` (JUnit XML + raw outputs)
            - \`app/build/reports/androidTests/\` (connected test HTML report + diagnostics)
            EOF
            ATTEMPTS_USED="$attempt" \
            MAX_ATTEMPTS="$max_attempts" \
            STATUS="$status" \
            DURATION_SECONDS="$duration_seconds" \
            GRADLE_TASK="$gradle_task" \
            python3 - <<'PY'
            import json
            import os
            from pathlib import Path

            gate_metadata = {
                "gate_id": "instrumented-migration",
                "gate_name": "Instrumented Migration (Room)",
                "gradle_task": os.environ["GRADLE_TASK"],
                "merge_policy": "blocking",
                "retry_enabled": True,
                "attempts_used": int(os.environ["ATTEMPTS_USED"]),
                "max_attempts": int(os.environ["MAX_ATTEMPTS"]),
                "status": os.environ["STATUS"],
                "duration_seconds": int(os.environ["DURATION_SECONDS"]),
            }
            Path("ci-metadata").mkdir(parents=True, exist_ok=True)
            Path("ci-metadata/gate-instrumented-migration.json").write_text(
                json.dumps(gate_metadata, indent=2),
                encoding="utf-8",
            )
            PY
            if [ "$status" != "success" ]; then
              exit 1
            fi

      - name: Upload migration instrumented artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-instrumented-migration
          path: |
            ci-metadata/gate-instrumented-migration.json
            app/build/outputs/androidTest-results/**
            app/build/reports/androidTests/**
          if-no-files-found: error

  quality-summary:
    name: Quality Summary
    runs-on: ubuntu-latest
    if: always()
    needs:
      - verify
      - instrumented-smoke
      - instrumented-migration
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download gate artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Build quality summary
        run: |
          python3 scripts/ci/quality_gate_report.py \
            --artifacts-dir artifacts \
            --matrix-doc docs/ci-quality-matrix.md \
            --output ci-quality-summary.md
          cat ci-quality-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Validate migration diagnostics policy
        run: |
          python3 scripts/ci/validate_migration_diagnostics.py \
            --artifacts-dir artifacts \
            --output ci-migration-diagnostics-check.md
          cat ci-migration-diagnostics-check.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload quality summary
        uses: actions/upload-artifact@v4
        with:
          name: quality-summary
          path: ci-quality-summary.md
          if-no-files-found: error

      - name: Upload migration diagnostics validation
        uses: actions/upload-artifact@v4
        with:
          name: quality-migration-diagnostics-validation
          path: ci-migration-diagnostics-check.md
          if-no-files-found: error
